[General]
network             = vanetmec.simulations.TaskOffloadVanet.CityMecVanet
cmdenv-express-mode = true
sim-time-limit      = 300s
**.cmdenv-log-level = warn
num-rngs = 3
debug-on-errors   = false    # stops Qtenv pausing on this warning
# **.d2dCapable     = false    # tells Simu5G not to perform D2D capability queries

# ============================================================
# TraCI — Erlangen city scenario
# ============================================================
*.manager.updateInterval       = 0.1s
*.manager.host                 = "localhost"
*.manager.port                 = 9999
*.manager.autoShutdown         = true
*.manager.moduleType           = "simu5g.nodes.cars.NRCar"
*.manager.moduleName           = "car"
*.manager.moduleDisplayString  = ""
*.manager.launchConfig         = xmldoc("erlangen.launchd.xml")

*.car[*].mobility.typename = "VeinsInetMobility"

# plain NR NIC
*.gnb*.cellularNic.typename = "NRNicEnb"
*.car[*].macCellId   = 0
*.car[*].masterId    = 0
*.car[*].nrMacCellId = 1
*.car[*].nrMasterId  = 1
**.dynamicCellAssociation = true
**.enableHandover         = true

# *.playgroundSizeX = 2607m
# *.playgroundSizeY = 3010m
# *.playgroundSizeZ = 50m

# Tell obstacle control to load building polygons
*.obstacles.obstacles = xmldoc("config.xml", "//AnalogueModel[@type='SimpleObstacleShadowing']/obstacles")

# MOBILITY PARAMETERS
**.mobility.initFromDisplayString = false
**.mobility.constraintAreaMinX    = 0m
**.mobility.constraintAreaMinY    = 0m
**.mobility.constraintAreaMinZ    = 0m
**.mobility.constraintAreaMaxX    = 2607m
**.mobility.constraintAreaMaxY    = 3010m
**.mobility.constraintAreaMaxZ    = 50m

# Positions:
# gNBs repositioned to match actual car area
# car[4] confirmed at (978, 1329) — cover full map with triangle
*.gnb1.mobility.initialX = 900m
*.gnb1.mobility.initialY = 1300m
*.gnb1.mobility.initialZ = 25m

*.gnb2.mobility.initialX = 1600m
*.gnb2.mobility.initialY = 1100m
*.gnb2.mobility.initialZ = 25m

*.gnb3.mobility.initialX = 2300m
*.gnb3.mobility.initialY = 1400m
*.gnb3.mobility.initialZ = 25m

# iUpfs — same normalized coordinates as their gNB
*.iUpf1.mobility.initialX = 900m
*.iUpf1.mobility.initialY = 1300m

*.iUpf2.mobility.initialX = 1600m
*.iUpf2.mobility.initialY = 1100m

*.iUpf3.mobility.initialX = 2300m
*.iUpf3.mobility.initialY = 1400m

# mecHosts — same as their gNB
*.mecHost1.mobility.initialX = 900m
*.mecHost1.mobility.initialY = 1300m

*.mecHost2.mobility.initialX = 1600m
*.mecHost2.mobility.initialY = 1100m

*.mecHost3.mobility.initialX = 2300m
*.mecHost3.mobility.initialY = 1400m

# ============================================================
# X2 NED Connections
# ============================================================
*.gnb*.numX2Apps = 2
*.gnb*.x2App[*].server.localPort = 5000 + ancestorIndex(1)

# gnb1 peers: gnb2 (via gnb2's x2ppp0), gnb3 (via gnb3's x2ppp1)
*.gnb1.x2App[0].client.connectAddress = "gnb2%x2ppp0"
*.gnb1.x2App[1].client.connectAddress = "gnb3%x2ppp1"

# gnb2 peers: gnb1 (via gnb1's x2ppp0), gnb3 (via gnb3's x2ppp0)
*.gnb2.x2App[0].client.connectAddress = "gnb1%x2ppp0"
*.gnb2.x2App[1].client.connectAddress = "gnb3%x2ppp0"

# gnb3 peers: gnb2 (via gnb2's x2ppp1), gnb1 (via gnb1's x2ppp1)
*.gnb3.x2App[0].client.connectAddress = "gnb2%x2ppp1"
*.gnb3.x2App[1].client.connectAddress = "gnb1%x2ppp1"

# ============================================================
# MEC orchestrator
# ============================================================
*.mecOrchestrator.mecHostList                   = "mecHost1 mecHost2 mecHost3"
*.mecOrchestrator.selectionPolicy               = "AvailableResourcesBased"
*.mecOrchestrator.mecApplicationPackageList     = "MECResponseApp"
*.mecHost*.mecPlatformManager.mecOrchestrator   = "mecOrchestrator"

# ── RNI support──────────────────
**.hasRNISupport = true

# ============================================================
# MEC host VIM resources
# schedulingList removed — app registration is via descriptor.
# maxCPU is all-caps as found in VIM NED.
# ============================================================

*.mecHost*.vim.maxRam  = 32GB
*.mecHost*.vim.maxDisk = 1TB
*.mecHost*.vim.maxCPU  = 4.0
**.mecHost*.vim.scheduling = "fair"
*.mecHost*.maxCpuSpeed = 400000
*.mecHost*.maxMECApps = 1000
*.mecHost1.eNBList = "gnb1"
*.mecHost2.eNBList = "gnb2"
*.mecHost3.eNBList = "gnb3"

*.mecHost*.mecPlatform.numMecServices = 1

*.mecHost1.mecPlatform.mecService[0].typename     = "RNIService"
*.mecHost1.mecPlatform.mecService[0].localAddress = "mecHost1.virtualisationInfrastructure"
*.mecHost1.mecPlatform.mecService[0].localPort    = 10020
*.mecHost1.mecPlatform.serviceRegistry.localAddress = "mecHost1.virtualisationInfrastructure"
*.mecHost1.mecPlatform.serviceRegistry.localPort    = 10021

*.mecHost2.mecPlatform.numMecServices = 1
*.mecHost2.mecPlatform.mecService[0].typename     = "RNIService"
*.mecHost2.mecPlatform.mecService[0].localAddress = "mecHost2.virtualisationInfrastructure"
*.mecHost2.mecPlatform.mecService[0].localPort    = 10020
*.mecHost2.mecPlatform.serviceRegistry.localAddress = "mecHost2.virtualisationInfrastructure"
*.mecHost2.mecPlatform.serviceRegistry.localPort    = 10021

*.mecHost3.mecPlatform.numMecServices = 1
*.mecHost3.mecPlatform.mecService[0].typename     = "RNIService"
*.mecHost3.mecPlatform.mecService[0].localAddress = "mecHost3.virtualisationInfrastructure"
*.mecHost3.mecPlatform.mecService[0].localPort    = 10020
*.mecHost3.mecPlatform.serviceRegistry.localAddress = "mecHost3.virtualisationInfrastructure"
*.mecHost3.mecPlatform.serviceRegistry.localPort    = 10021

# random number generators configuration
*.mecHost*.mecPlatform.serviceRegistry.rng-0 = 0 # request service time
*.mecHost*.mecPlatform.serviceRegistry.rng-1 = 1 # subscription service time
*.mecHost*.mecPlatform.mecService[0].rng-0 = 1 # request service time
*.mecHost*.mecPlatform.mecService[0].rng-1 = 2 # subscription service time
*.mecHost*.mecPlatform.mecService[0].requestServiceTime = 4ms
*.mecHost*.mecPlatform.mecService[0].subscriptionServiceTime = 11us

# ============================================================
# MEC Hosts
# ============================================================
**.mecHost*.virtualisationInfrastructure.ipv4.forwarding = true

# ============================================================
# MECResponseApp parameters (applied when instantiated)
# ============================================================
**.MECResponseApp.responsePacketSize = 20480
**.MECResponseApp.minInstructions    = 9000000
**.MECResponseApp.maxInstructions    = 12000000
**.MECResponseApp.requiredRam        = 10MB
**.MECResponseApp.requiredDisk       = 100MB
**.MECResponseApp.requiredCpu        = 0.5

# ============================================================
# Car application stack
# Car positions: NOT set here — SUMO/TraCI owns them entirely.
# ============================================================
*.car[*].numApps = 2

*.car[*].app[0].typename = "DeviceApp"
*.car[*].app[0].localPort = 4500
*.car[*].app[0].UALCMPAddress = "ualcmp"
*.car[*].app[0].UALCMPPort = 1000
*.car[*].app[0].appPackageSource = "ApplicationDescriptors/MECResponseApp.json"

*.car[*].app[1].typename          = "UERequestApp"
*.car[*].app[1].localPort         = 4000
*.car[*].app[1].deviceAppPort     = 4500
*.car[*].app[1].deviceAppAddress = "car["+string(ancestorIndex(1))+"]"
*.car[*].app[1].mecAppName        = "MECResponseApp"
*.car[*].app[1].requestPacketSize = 60000 #60KB for now
*.car[*].app[1].period            = 3s
*.car[*].app[1].startTime         = 5s
*.car[*].app[1].stopTime          = 280s

# ============================================================
# Result recording
# ============================================================
**.scalar-recording                  = true
**.vector-recording                  = true
*.car[*].app[*].**.vector-recording  = true

[Config DebugPackets]
extends = General
sim-time-limit = 30s
cmdenv-express-mode = false
*.car[*].app[1].cmdenv-log-level = info
**.cmdenv-log-level = warn