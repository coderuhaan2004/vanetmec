[General]
image-path = ../../../../Simu5G-1.2.2/images

output-scalar-file-append = false
output-scalar-file = ${resultdir}/${configname}/${iterationvars}-${repetition}.sca
output-vector-file  = ${resultdir}/${configname}/${iterationvars}-${repetition}.vec
seed-set = ${repetition}
num-rngs = 3
**.vector-recording = false
**.sctp.**.scalar-recording = false
**.sctp.**.vector-recording = false
**.routingRecorder.enabled = true

# Selective vector recording
MecVanetGrid.car[*].cellularNic.nrChannelModel[0].rcvdSinrDl.vector-recording    = true
MecVanetGrid.car[*].cellularNic.nrChannelModel[0].measuredSinrDl.vector-recording = true
MecVanetGrid.car[*].cellularNic.nrPhy.averageCqiDl.vector-recording               = true
MecVanetGrid.gnb*.cellularNic.channelModel[0].rcvdSinrUl.vector-recording         = true
MecVanetGrid.**.warningAlert*.vector-recording = true
MecVanetGrid.mecHost*.**.vector-recording      = true

**.sctp.nagleEnabled     = false
**.sctp.enableHeartbeats = false

**.downlink_interference = true
**.uplink_interference   = true
**.ueTxPower     = 26
**.eNodeBTxPower = 46
**.targetBler    = 0.01
**.blerShift     = 5
**.fbPeriod      = 40

**.tcp.typename          = "Tcp"
**.tcp.advertisedWindow  = 65535
**.tcp.tcpAlgorithmClass = "TcpReno"
**.tcp.sackSupport       = true

# ═══════════════════════════════════════════════════════════════
[Config MecVanet]
# ═══════════════════════════════════════════════════════════════
sim-time-limit = 100s
network = vanetmec.simulations.SimpleVanetMEC.MecVanetGrid

*.playgroundSizeX = 1000m
*.playgroundSizeY = 1000m
*.playgroundSizeZ = 50m

# ── Veins/SUMO ────────────────────────────────────────────────
*.veinsManager.host           = "localhost"
*.veinsManager.moduleType     = "simu5g.nodes.cars.NRCar"
*.veinsManager.moduleName     = "car"
*.veinsManager.launchConfig   = xmldoc("grid.launchd.xml")
*.veinsManager.updateInterval = 0.1s

# Fixed cars — disable dynamic create/destroy
*.veinsManager.numVehicles    = 10

*.car[*].mobility.typename = "VeinsInetMobility"

# ── Carrier Aggregation ───────────────────────────────────────
*.carrierAggregation.numComponentCarriers = 1
*.carrierAggregation.componentCarrier[0].numerologyIndex  = 0
*.carrierAggregation.componentCarrier[0].carrierFrequency = 2GHz
*.carrierAggregation.componentCarrier[0].numBands         = 50

*.gnb*.cellularNic.numCarriers = 1
*.gnb*.cellularNic.channelModel[0].componentCarrierIndex = 0
*.car[*].cellularNic.numCarriers = 1
*.car[*].cellularNic.nrChannelModel[0].componentCarrierIndex = 0

*.car[*].cellularNic.pdcpRrc.backgroundRlc     = 1
*.car[*].cellularNic.pdcpRrc.conversationalRlc = 1
*.car[*].cellularNic.pdcpRrc.streamingRlc      = 1
*.car[*].cellularNic.pdcpRrc.interactiveRlc    = 2

# ── gNodeB placement ──────────────────────────────────────────
*.gnb1.mobility.initialX = 250m
*.gnb1.mobility.initialY = 500m
*.gnb2.mobility.initialX = 750m
*.gnb2.mobility.initialY = 500m

**.gnb1.macCellId  = 1
**.gnb1.macNodeId  = 1
**.gnb2.macCellId  = 2
**.gnb2.macNodeId  = 2

*.car[*].macCellId   = 0
*.car[*].masterId    = 0
*.car[*].nrMacCellId = 1
*.car[*].nrMasterId  = 1
**.dynamicCellAssociation = true

# ── Handover ──────────────────────────────────────────────────
*.car[*].cellularNic.nrPhy.enableHandover = true
*.gnb*.cellularNic.phy.enableHandover     = true
*.gnb*.cellularNic.phy.handoverLatency    = 50ms
*.gnb*.cellInfo.broadcastMessageInterval  = 1s

# ── X2 ────────────────────────────────────────────────────────
*.gnb*.numX2Apps = 1
*.gnb*.x2App[*].server.localPort = 5000 + ancestorIndex(1)
*.gnb1.x2App[0].client.connectAddress = "gnb2%x2ppp0"
*.gnb2.x2App[0].client.connectAddress = "gnb1%x2ppp0"

# ── MEC Hosts ─────────────────────────────────────────────────
**.mecHost*.virtualisationInfrastructure.ipv4.forwarding = true
*.mecHost*.maxMECApps  = 100
*.mecHost*.maxRam      = 32GB
*.mecHost*.maxDisk     = 100TB
*.mecHost1.maxCpuSpeed = 400000
*.mecHost2.maxCpuSpeed = 500
*.mecHost*.bsList      = "gnb1, gnb2"

*.mecHost1.mecPlatform.numMecServices = 0

*.mecHost2.mecPlatform.numMecServices = 1
*.mecHost2.mecPlatform.mecService[0].typename     = "LocationService"
*.mecHost2.mecPlatform.mecService[0].localAddress = "mecHost2.virtualisationInfrastructure"
*.mecHost2.mecPlatform.mecService[0].localPort    = 10020
*.mecHost2.mecPlatform.serviceRegistry.localAddress = "mecHost2.virtualisationInfrastructure"
*.mecHost2.mecPlatform.serviceRegistry.localPort    = 10021
*.mecHost2.mecPlatform.serviceRegistry.rng-0        = 0
*.mecHost2.mecPlatform.serviceRegistry.rng-1        = 1
*.mecHost2.mecPlatform.mecService[0].rng-0          = 0
*.mecHost2.mecPlatform.mecService[0].rng-1          = 1
*.mecHost2.mecPlatform.mecService[0].requestServiceTime      = 20us
*.mecHost2.mecPlatform.mecService[0].subscriptionServiceTime = 11us

# ── MEC Orchestrator ──────────────────────────────────────────
*.mecOrchestrator.mecHostList                = "mecHost1, mecHost2"
*.mecOrchestrator.selectionPolicy           = "MecHostBased"
*.mecOrchestrator.mecHostIndex              = 0
*.mecOrchestrator.mecApplicationPackageList = "WarningAlertApp"
*.mecHost*.mecPlatformManager.mecOrchestrator = "mecOrchestrator"

# ── Car Applications ──────────────────────────────────────────
*.car[*].numApps = 2

*.car[*].app[0].typename        = "DeviceApp"
*.car[*].app[0].localPort       = 4500
*.car[*].app[0].UALCMPAddress   = "ualcmp"
*.car[*].app[0].UALCMPPort      = 1000
*.car[*].app[0].appPackageSource = "ApplicationDescriptors/WarningAlertApp.json"

*.car[*].app[1].typename         = "UEWarningAlertApp"
*.car[*].app[1].deviceAppAddress = "car["+string(ancestorIndex(1))+"]"
*.car[*].app[1].deviceAppPort    = 4500
*.car[*].app[1].startTime        = 4s    # t=0 spawn, so 1s is enough margin
*.car[*].app[1].stopTime         = 90s
*.car[*].app[1].positionX        = 500
*.car[*].app[1].positionY        = 500